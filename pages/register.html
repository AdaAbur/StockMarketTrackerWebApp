<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradeon - Register</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/login.css?v=2" />
</head>
<body>
  <main class="auth-page">
    <a href="../index.html" class="auth-back" id="auth-back">&larr; Go Back</a>

    <div class="auth-card glass-card">
      <div class="auth-brand">trade<span class="auth-dot"></span>on</div>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-subtitle">Sign up to get started</p>

      <form id="register-form" class="auth-form">
        <label class="auth-label" for="name">Full Name</label>
        <input type="text" id="name" class="auth-input" placeholder="Your name" />

        <label class="auth-label" for="email">Email</label>
        <input type="email" id="email" class="auth-input" placeholder="you@example.com" />

        <label class="auth-label" for="password">Password</label>
        <input type="password" id="password" class="auth-input" placeholder="Create a password" />

        <label class="auth-label" for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" class="auth-input" placeholder="Repeat your password" />

        <button type="submit" class="glass-btn auth-btn">Register</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Log In</a></p>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase.js"></script>
  <script src="../js/register.js?v=4"></script>
</body>
</html>
