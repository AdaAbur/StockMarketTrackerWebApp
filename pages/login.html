<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradeon - Login</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/login.css?v=2" />
</head>
<body>
  <main class="auth-page">
    <a href="../index.html" class="auth-back">&larr; Go Back</a>

    <div class="auth-card glass-card">
      <div class="auth-brand">trade<span class="auth-dot"></span>on</div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Log in to your account</p>

      <form id="login-form" class="auth-form" autocomplete="off">
        <label class="auth-label" for="email">Email</label>
        <input type="email" id="email" class="auth-input" placeholder="you@example.com" autocomplete="off" />

        <label class="auth-label" for="password">Password</label>
        <input type="password" id="password" class="auth-input" placeholder="Enter your password" autocomplete="new-password" />

        <button type="submit" class="glass-btn auth-btn">Log In</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </main>

  <script src="../js/login.js?v=2"></script>
</body>
</html>
