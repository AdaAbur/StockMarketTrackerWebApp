<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradeon - Settings</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/settings.css?v=4" />
</head>
<body>
  <main class="page">
    <h1>Settings</h1>

    <section class="glass-card settings-section" id="password-section">
      <h2 class="section-title">Change Password</h2>
      <form id="password-form" class="settings-form">
        <label class="settings-label" for="current-password">Current Password</label>
        <input type="password" id="current-password" class="settings-input" placeholder="Current password" />

        <label class="settings-label" for="new-password">New Password</label>
        <input type="password" id="new-password" class="settings-input" placeholder="New password" />

        <label class="settings-label" for="confirm-new-password">Confirm New Password</label>
        <input type="password" id="confirm-new-password" class="settings-input" placeholder="Repeat new password" />

        <button type="submit" class="glass-btn settings-btn">Update Password</button>
        <p id="password-feedback" class="settings-feedback"></p>
      </form>
    </section>

    <section class="glass-card settings-section">
      <h2 class="section-title">Currency</h2>
      <div class="settings-form">
        <label class="settings-label">Display Currency</label>
        <div class="settings-dropdown" id="currency-dropdown">
          <button type="button" class="settings-select" id="currency-toggle">USD ($)</button>
          <div class="settings-menu" id="currency-menu"></div>
        </div>
        <p id="currency-feedback" class="settings-feedback"></p>
      </div>
    </section>

    <section class="glass-card settings-section">
      <h2 class="section-title">Theme</h2>
      <div class="settings-form">
        <label class="settings-label">Appearance</label>
        <div class="settings-dropdown" id="theme-dropdown">
          <button type="button" class="settings-select" id="theme-toggle">Dark</button>
          <div class="settings-menu" id="theme-menu"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="../components/navbar.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/settings.js?v=5"></script>
</body>
</html>
