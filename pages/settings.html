<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradeon - Settings</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/settings.css" />
</head>
<body>
  <main class="page">
    <h1>Settings</h1>

    <section class="glass-card settings-section">
      <h2 class="section-title">Profile</h2>
      <form id="profile-form" class="settings-form">
        <label class="settings-label" for="profile-name">Name</label>
        <input type="text" id="profile-name" class="settings-input" placeholder="Your name" />

        <label class="settings-label" for="profile-email">Email</label>
        <input type="email" id="profile-email" class="settings-input" placeholder="you@example.com" />

        <button type="submit" class="glass-btn settings-btn">Save Profile</button>
        <p id="profile-feedback" class="settings-feedback"></p>
      </form>
    </section>

    <section class="glass-card settings-section">
      <h2 class="section-title">Change Password</h2>
      <form id="password-form" class="settings-form">
        <label class="settings-label" for="current-password">Current Password</label>
        <input type="password" id="current-password" class="settings-input" placeholder="Current password" />

        <label class="settings-label" for="new-password">New Password</label>
        <input type="password" id="new-password" class="settings-input" placeholder="New password" />

        <label class="settings-label" for="confirm-new-password">Confirm New Password</label>
        <input type="password" id="confirm-new-password" class="settings-input" placeholder="Repeat new password" />

        <button type="submit" class="glass-btn settings-btn">Update Password</button>
        <p id="password-feedback" class="settings-feedback"></p>
      </form>
    </section>

    <section class="glass-card settings-section">
      <h2 class="section-title">Theme</h2>
      <div class="settings-form">
        <label class="settings-label" for="theme-select">Appearance</label>
        <select id="theme-select" class="settings-input">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
      </div>
    </section>
  </main>

  <script src="../components/navbar.js"></script>
  <script src="../js/settings.js"></script>
</body>
</html>
