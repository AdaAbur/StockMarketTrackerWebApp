<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradeon - Dashboard</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>
  <nav class="temp-nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="stock-details.html">Stock Details</a>
    <a href="portfolio.html">Portfolio</a>
  </nav>

  <main class="page">
    <header class="dashboard-header">
      <h1>Dashboard</h1>
      <p>Welcome back</p>
    </header>

    <section class="dashboard-section">
      <h2 class="section-title">Summary</h2>
      <div class="summary-cards">
        <div class="glass-card stat-card">
          <p class="stat-label">Total Portfolio Value</p>
          <p class="stat-value">$12,500.00</p>
        </div>
        <div class="glass-card stat-card">
          <p class="stat-label">Holdings</p>
          <p class="stat-value">3</p>
        </div>
        <div class="glass-card stat-card">
          <p class="stat-label">Top Performer</p>
          <p class="stat-value">NVDA <span class="text-gain">+4.2%</span></p>
        </div>
      </div>
    </section>

    <div class="dashboard-grid">
      <section class="dashboard-section">
        <h2 class="section-title">Watchlist</h2>
        <div class="watchlist-preview">
          <!-- Watchlist preview -->
        </div>
      </section>

      <section class="dashboard-section">
        <h2 class="section-title">Market Overview</h2>
        <div class="stock-overview">
          <!-- Stock overview -->
        </div>
      </section>
    </div>
  </main>
</body>
</html>
