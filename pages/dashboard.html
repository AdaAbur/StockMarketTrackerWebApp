<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradeon - Dashboard</title>
  <link rel="stylesheet" href="../css/style.css" />

<body>
  <main class="page">
    <header class="dashboard-header">
      <p class="dashboard-welcome">Welcome back,</p>
      <h1 id="dashboard-greeting">Welcome</h1>
      <p class="dashboard-location" id="dashboard-location">Detecting your location...</p>

    <section class="dashboard-section">
      <div class="section-head">
        <h2 class="section-title">Recent Transactions</h2>
      </div>
      <div class="txn-scroll" id="recent-transactions"></div>
    </section>

    <section class="dashboard-section">
      <div class="section-head">
        <h2 class="section-title">Trending Stocks</h2>
        <a class="see-all" href="stock-search.html">See all</a>
      </div>
      <div class="trending-stocks glass-card"></div>
    </section>

    <section class="dashboard-section">
      <div class="section-head">
        <h2 class="section-title">Trending News</h2>
        <a class="see-all" href="news.html">See all</a>
      </div>
      <div class="dashboard-news glass-card"></div>
    </section>
  </main>
