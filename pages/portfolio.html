<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradeon - Portfolio</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/portfolio.css" />
</head>
<body>
  <main class="page">
    <section class="portfolio-summary glass-card">
      <!-- Total portfolio value -->
    </section>

    <section class="portfolio-section glass-card">
      <h2 class="section-title">Add Holding</h2>
      <form class="holding-form" id="holding-form">
        <input type="text" id="symbol" placeholder="Symbol (e.g. AAPL)" required />
        <input type="number" id="shares" placeholder="Shares" min="0" step="any" required />
        <input type="number" id="price" placeholder="Purchase price" min="0" step="any" required />
        <button type="submit" class="glass-btn">Add</button>
        <p class="form-feedback" id="form-feedback"></p>
      </form>
    </section>

    <section class="portfolio-section">
      <h2 class="section-title">Holdings</h2>
      <div class="holdings-list"></div>
    </section>
  </main>

  <script src="../components/navbar.js"></script>
  <script src="../js/portfolio.js"></script>
</body>
</html>
