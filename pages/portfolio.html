<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradeon - Portfolio</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/portfolio.css?v=3" />
</head>
<body>
  <main class="page">
    <h1>Portfolio</h1>

    <section class="portfolio-summary glass-card"></section>

    <div class="portfolio-grid">
      <section class="portfolio-section glass-card">
        <h2 class="section-title">Allocation</h2>
        <div class="alloc-wrapper">
          <canvas id="alloc-chart"></canvas>
        </div>
      </section>

      <section class="portfolio-section glass-card">
        <h2 class="section-title">Holdings</h2>
        <div class="holdings-table-wrap">
          <table class="holdings-table">
            <thead>
              <tr>
                <th>Symbol</th>
                <th>Shares</th>
                <th>Avg Buy</th>
                <th>Current</th>
                <th>Value</th>
                <th>P/L</th>
                <th>Bought</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="holdings-body"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase.js"></script>
  <script src="../js/firestore-data.js"></script>
  <script src="../components/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/portfolio.js?v=5"></script>
</body>
</html>
