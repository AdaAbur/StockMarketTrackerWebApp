<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradeon - Stock Details</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/stock-details.css?v=5" />
</head>
<body>
  <main class="page">
    <a href="#" class="back-link" id="go-back">&larr; Go Back</a>

    <section class="stock-header glass-card"></section>

    <section class="stock-section glass-card">
      <h2 class="section-title">Price Chart</h2>
      <div class="chart-ranges">
        <button class="range-btn range-btn-active" data-range="1D">1D</button>
        <button class="range-btn" data-range="1M">1M</button>
        <button class="range-btn" data-range="3M">3M</button>
        <button class="range-btn" data-range="1Y">1Y</button>
      </div>
      <div class="chart-wrapper">
        <canvas id="price-chart"></canvas>
      </div>
    </section>

    <div class="stock-layout">
      <section class="stock-section glass-card stock-main">
        <h2 class="section-title">Company Information</h2>
        <div class="company-info"></div>
      </section>

      <aside class="stock-side">
        <section class="stock-section glass-card trade-panel">
          <div class="trade-tabs">
            <button type="button" class="trade-tab trade-tab-active" id="tab-buy">Buy</button>
            <button type="button" class="trade-tab" id="tab-sell">Sell</button>
          </div>

          <p class="trade-available" id="trade-available">Available: -</p>

          <label class="trade-label">Quantity</label>
          <div class="qty-row">
            <button type="button" class="qty-btn" id="qty-minus">-</button>
            <input type="number" id="qty-input" class="qty-input" value="1" min="0" step="any" />
            <button type="button" class="qty-btn" id="qty-plus">+</button>
          </div>

          <div class="order-summary">
            <h3 class="order-title">Order Summary</h3>
            <div class="order-row"><span>Price per Share</span><span id="sum-price">-</span></div>
            <div class="order-row"><span>Shares</span><span id="sum-shares">-</span></div>
            <div class="order-row"><span>Trading Fee (0.1%)</span><span id="sum-fee">-</span></div>
            <div class="order-row order-total"><span>Total</span><span id="sum-total">-</span></div>
          </div>

          <button class="glass-btn trade-btn trade-btn-buy" id="trade-btn">Buy</button>
          <p id="trade-feedback" class="buy-feedback"></p>
        </section>

        <button class="glass-btn watchlist-side-btn" id="watchlist-btn">Add to Watchlist</button>
      </aside>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase.js"></script>
  <script src="../js/firestore-data.js"></script>
  <script src="../components/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/stock-details.js?v=9"></script>
  <script src="../js/chart.js"></script>
</body>
</html>
