<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradeon - Stock Details</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/stock-details.css?v=3" />
</head>
<body>
  <main class="page">
    <section class="stock-header glass-card"></section>

    <section class="stock-section glass-card">
      <h2 class="section-title">Price Chart</h2>
      <div class="chart-ranges">
        <button class="range-btn range-btn-active" data-range="1D">1D</button>
        <button class="range-btn" data-range="1M">1M</button>
        <button class="range-btn" data-range="3M">3M</button>
        <button class="range-btn" data-range="1Y">1Y</button>
      </div>
      <div class="chart-wrapper">
        <canvas id="price-chart"></canvas>
      </div>
    </section>

    <section class="stock-section glass-card">
      <h2 class="section-title">Company Information</h2>
      <div class="company-info"></div>
    </section>

    <section class="stock-section glass-card">
      <h2 class="section-title">Buy</h2>
      <div class="buy-row">
        <input type="number" id="buy-shares" class="buy-input" placeholder="Number of shares" min="0" step="any" />
        <button class="glass-btn" id="buy-btn">Buy</button>
      </div>
      <p id="buy-feedback" class="buy-feedback"></p>
    </section>

    <div class="stock-actions">
      <button class="glass-btn" id="watchlist-btn">Add to Watchlist</button>
    </div>
  </main>

  <script src="../components/navbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../components/error-message.js"></script>
  <script src="../js/stock-details.js?v=3"></script>
  <script src="../js/chart.js"></script>
</body>
</html>
