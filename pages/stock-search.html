<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradeon - Stock Search</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/stock-search.css" />
</head>
<body>
  <main class="page">
    <h1>Stocks</h1>
    <input type="text" id="stock-search-input" class="search-bar" placeholder="Search stocks..." />
    <select id="country-select" class="country-select">
      <option value="">All countries</option>
      <option value="United States">United States</option>
      <option value="United Kingdom">United Kingdom</option>
      <option value="Germany">Germany</option>
      <option value="France">France</option>
      <option value="Turkey">Turkey</option>
      <option value="Japan">Japan</option>
      <option value="Canada">Canada</option>
      <option value="India">India</option>
    </select>
    <div class="stock-results"></div>
  </main>

  <script src="../components/navbar.js"></script>
  <script src="../components/stock-row.js"></script>
  <script src="../components/error-message.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/stock-search.js"></script>
</body>
</html>
