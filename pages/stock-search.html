<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tradeon - Stock Search</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/stock-search.css?v=3" />
</head>
<body>
  <main class="page">
    <div class="search-header">
      <h1>Stocks</h1>
      <div class="country-dropdown" id="country-dropdown">
        <button type="button" class="country-toggle" id="country-toggle">All countries</button>
        <div class="country-menu" id="country-menu"></div>
      </div>
    </div>
    <input type="text" id="stock-search-input" class="search-bar" placeholder="Search stocks..." />
    <div class="stock-results"></div>
  </main>

  <script src="../components/navbar.js"></script>
  <script src="../components/stock-row.js"></script>
  <script src="../components/error-message.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/stock-search.js?v=4"></script>
</body>
</html>
